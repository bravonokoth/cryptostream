name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-ingestor

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  test-data-pipeline:
    name: Test Airflow & dbt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install apache-airflow==2.9.1
          pip install -r airflow/requirements.txt
          pip install dbt-postgres

      - name: Validate Airflow DAGs
        run: |
          export AIRFLOW_HOME=$(pwd)/airflow
          airflow db migrate
          python -c "from airflow.models import DagBag; d = DagBag(dag_folder='airflow/dags'); assert not d.import_errors, f'DAG import errors: {d.import_errors}'"

      - name: Validate dbt Models
        run: |
          mkdir -p ~/.dbt
          echo "cryptostream:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                user: dummy
                password: dummy
                port: 5432
                dbname: dummy
                schema: public" > ~/.dbt/profiles.yml
          dbt parse --project-dir dbt_transform

  build-ingestor:
    name: Build Ingestor Docker Image
    runs-on: ubuntu-latest
    needs: [validate, test-data-pipeline]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        # Only login if it's a push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ingestor
          file: ./ingestor/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
